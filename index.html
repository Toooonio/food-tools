<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>今天吃什么？</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  
  body {
    font-family: -apple-system, 'PingFang SC', 'Microsoft YaHei', sans-serif;
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #fdf2e9 0%, #fce4ec 50%, #e8eaf6 100%);
    background-attachment: fixed;
    padding: 20px;
  }
  
  .container {
    background: rgba(255,255,255,0.85);
    backdrop-filter: blur(12px);
    border-radius: 32px;
    padding: 40px 36px 36px;
    max-width: 640px;
    width: 100%;
    box-shadow: 0 20px 60px rgba(0,0,0,0.10), 0 4px 16px rgba(0,0,0,0.06);
    text-align: center;
    position: relative;
  }
  
  h1 {
    font-size: 28px;
    font-weight: 700;
    color: #2d3436;
    margin-bottom: 4px;
    letter-spacing: 2px;
  }
  
  .subtitle {
    font-size: 14px;
    color: #888;
    margin-bottom: 28px;
  }

  /* ── 转盘区域 ── */
  .wheel-wrapper {
    position: relative;
    width: 340px;
    height: 340px;
    margin: 0 auto 24px;
  }

  @media (max-width: 420px) {
    .wheel-wrapper { width: 280px; height: 280px; }
    .container { padding: 24px 16px 20px; }
    h1 { font-size: 22px; }
  }

  canvas#wheelCanvas {
    width: 100%;
    height: 100%;
    border-radius: 50%;
    box-shadow: 0 6px 30px rgba(0,0,0,0.12);
    display: block;
    cursor: pointer;
    transition: filter 0.3s;
  }
  canvas#wheelCanvas:active { filter: brightness(0.96); }

  /* 指针 */
  .pointer {
    position: absolute;
    top: -12px;
    left: 50%;
    transform: translateX(-50%);
    width: 0;
    height: 0;
    border-left: 18px solid transparent;
    border-right: 18px solid transparent;
    border-top: 30px solid #e74c3c;
    filter: drop-shadow(0 2px 6px rgba(231,76,60,0.5));
    z-index: 10;
  }
  .pointer::after {
    content: '';
    position: absolute;
    top: -34px;
    left: 50%;
    transform: translateX(-50%);
    width: 14px;
    height: 14px;
    background: #e74c3c;
    border-radius: 50%;
    box-shadow: 0 0 0 4px #fff, 0 2px 8px rgba(0,0,0,0.15);
  }

  /* ── 按钮 ── */
  .btn-spin {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: linear-gradient(135deg, #e74c3c, #c0392b);
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 14px 48px;
    font-size: 18px;
    font-weight: 600;
    letter-spacing: 2px;
    cursor: pointer;
    transition: transform 0.15s, box-shadow 0.2s;
    box-shadow: 0 6px 20px rgba(231,76,60,0.35);
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }
  .btn-spin:hover { transform: translateY(-2px); box-shadow: 0 8px 28px rgba(231,76,60,0.45); }
  .btn-spin:active { transform: scale(0.96); }
  .btn-spin:disabled {
    opacity: 0.5;
    cursor: not-allowed;
    transform: none !important;
  }
  .btn-spin::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(135deg, transparent 40%, rgba(255,255,255,0.15) 50%, transparent 60%);
    transform: translateX(-100%);
  }
  .btn-spin.spinning::after { animation: shimmer 0.8s infinite; }
  @keyframes shimmer { 100% { transform: translateX(100%); } }

  /* ── 结果区 ── */
  .result-area {
    margin-top: 20px;
    min-height: 58px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  #resultDisplay {
    font-size: 20px;
    color: #2d3436;
    opacity: 0;
    transition: opacity 0.4s;
  }
  #resultDisplay.show {
    opacity: 1;
  }
  #resultDisplay .emoji { font-size: 28px; margin-right: 6px; }
  #resultDisplay .food-name {
    font-size: 30px;
    font-weight: 700;
    color: #e74c3c;
  }
  #resultDisplay .hint { font-size: 14px; color: #aaa; }

  /* ── 历史 ── */
  .history-section {
    margin-top: 24px;
    padding-top: 20px;
    border-top: 1px solid #eee;
  }
  .history-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    font-size: 13px;
    color: #999;
    margin-bottom: 10px;
  }
  .history-header button {
    background: none;
    border: 1px solid #ddd;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 12px;
    color: #888;
    cursor: pointer;
    transition: 0.2s;
  }
  .history-header button:hover { border-color: #e74c3c; color: #e74c3c; }
  .history-items {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 32px;
  }
  .history-items .tag {
    background: #f5f5f5;
    border-radius: 20px;
    padding: 4px 14px;
    font-size: 13px;
    color: #555;
    animation: tag-in 0.3s ease;
  }
  @keyframes tag-in { from { opacity: 0; transform: scale(0.8); } to { opacity: 1; transform: scale(1); } }
  .history-empty {
    color: #ccc;
    font-size: 13px;
  }

  /* ── 彩屑 ── */
  .confetti-piece {
    position: fixed;
    width: 8px;
    height: 8px;
    border-radius: 2px;
    pointer-events: none;
    z-index: 999;
    animation: confetti-fall 1.2s ease-out forwards;
  }
  @keyframes confetti-fall {
    0%   { opacity: 1; transform: translateY(0) rotate(0deg) scale(1); }
    100% { opacity: 0; transform: translateY(400px) rotate(720deg) scale(0.3); }
  }
</style>
</head>
<body>

<div class="container">
  <h1>🍽️ 今天吃什么？</h1>
  <p class="subtitle">转盘停下的地方就是命运的安排</p>

  <div class="wheel-wrapper">
    <div class="pointer"></div>
    <canvas id="wheelCanvas" width="680" height="680"></canvas>
  </div>

  <button class="btn-spin" id="spinBtn">🎯 转一下！</button>

  <div class="result-area">
    <div id="resultDisplay"><span class="hint">点击转盘或按钮试试手气</span></div>
  </div>

  <div class="history-section">
    <div class="history-header">
      <span>📋 吃过的记录</span>
      <button id="clearHistoryBtn">清空</button>
    </div>
    <div class="history-items" id="historyItems">
      <span class="history-empty">还没有记录，转一下看看吧</span>
    </div>
  </div>
</div>

<script>
// ── 食物列表 ──
const FOODS = [
  { name: '麻辣烫',    emoji: '🍲' },
  { name: '炒面',      emoji: '🍝' },
  { name: '麦当劳',    emoji: '🍔' },
  { name: '肯德基',    emoji: '🍗' },
  { name: '炒菜',      emoji: '🥘' },
  { name: '火锅',      emoji: '🫕' },
  { name: '米线',      emoji: '🍜' },
  { name: '黄焖鸡',    emoji: '🍛' },
  { name: '螺蛳粉',    emoji: '🍜' },
  { name: '烧烤',      emoji: '🍖' },
  { name: '兰州拉面',  emoji: '🍜' },
  { name: '饺子',      emoji: '🥟' },
  { name: '麻辣香锅',  emoji: '🌶️' },
  { name: '酸菜鱼',    emoji: '🐟' },
  { name: '煲仔饭',    emoji: '🍚' },
  { name: '沙县小吃',  emoji: '🥟' },
  { name: '炸鸡',      emoji: '🍗' },
  { name: '凉皮',      emoji: '🥗' },
  { name: '小炒肉',    emoji: '🥩' },
  { name: '粥',        emoji: '🥣' },
];

// ── 颜色 ──
const COLORS = [
  '#FF6B6B', '#4ECDC4', '#FFE66D', '#A8E6CF', '#FF8A5C',
  '#6C5CE7', '#FD79A8', '#00B894', '#FDCB6E', '#E17055',
  '#0984E3', '#D63031', '#00CEC9', '#636E72', '#B2BEC3',
  '#74B9FF', '#A29BFE', '#FAB1A0', '#55EFC4', '#F8B500',
];

const N = FOODS.length;
const PI = Math.PI;
const TAU = 2 * PI;
const segment = TAU / N;

const canvas = document.getElementById('wheelCanvas');
const ctx = canvas.getContext('2d');
const spinBtn = document.getElementById('spinBtn');
const resultDisplay = document.getElementById('resultDisplay');

let currentAngle = 0;
let spinning = false;
let history = JSON.parse(localStorage.getItem('foodHistory') || '[]');

// ── 绘制转盘 ──
function drawWheel(angle) {
  const size = canvas.width;
  const cx = size / 2;
  const cy = size / 2;
  const r = size / 2 - 8;

  ctx.clearRect(0, 0, size, size);

  // 外圈光晕
  const grad = ctx.createRadialGradient(cx, cy, r - 20, cx, cy, r + 6);
  grad.addColorStop(0, 'rgba(255,255,255,0)');
  grad.addColorStop(0.9, 'rgba(255,255,255,0.08)');
  grad.addColorStop(1, 'rgba(255,255,255,0.25)');
  ctx.fillStyle = grad;
  ctx.beginPath();
  ctx.arc(cx, cy, r + 6, 0, TAU);
  ctx.fill();

  FOODS.forEach((food, i) => {
    const start = angle + i * segment;
    const end = start + segment;

    // 扇形
    ctx.beginPath();
    ctx.moveTo(cx, cy);
    ctx.arc(cx, cy, r, start, end);
    ctx.closePath();
    ctx.fillStyle = COLORS[i % COLORS.length];
    ctx.fill();

    // 描边
    ctx.strokeStyle = 'rgba(255,255,255,0.4)';
    ctx.lineWidth = 2;
    ctx.stroke();

    // 文字
    const mid = start + segment / 2;
    const textR = r * 0.65;
    const tx = cx + Math.cos(mid) * textR;
    const ty = cy + Math.sin(mid) * textR;

    ctx.save();
    ctx.translate(tx, ty);
    ctx.rotate(mid + PI / 2);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px "PingFang SC", "Microsoft YaHei", sans-serif';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = 'rgba(0,0,0,0.25)';
    ctx.shadowBlur = 4;
    const label = food.emoji + ' ' + food.name;
    ctx.fillText(label, 0, 0);
    ctx.restore();
  });

  // 中心装饰
  const centerGrad = ctx.createRadialGradient(cx, cy, 0, cx, cy, 28);
  centerGrad.addColorStop(0, '#fff');
  centerGrad.addColorStop(1, '#f0f0f0');
  ctx.beginPath();
  ctx.arc(cx, cy, 28, 0, TAU);
  ctx.fillStyle = centerGrad;
  ctx.fill();
  ctx.strokeStyle = '#ddd';
  ctx.lineWidth = 2;
  ctx.stroke();

  ctx.fillStyle = '#e74c3c';
  ctx.font = 'bold 15px sans-serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('吃', cx, cy);
}

// ── 获取选中食物 ──
function getSelectedFood(angle) {
  const pointer = -PI / 2;
  let raw = (pointer - angle + TAU) % TAU;
  let idx = Math.floor(raw / segment);
  if (idx >= N) idx = 0;
  return idx;
}

// ── 彩屑 ──
function fireConfetti() {
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A8E6CF','#6C5CE7','#FD79A8','#00B894','#F8B500'];
  for (let i = 0; i < 60; i++) {
    const el = document.createElement('div');
    el.className = 'confetti-piece';
    el.style.left = Math.random() * 100 + 'vw';
    el.style.top = '-10px';
    el.style.background = colors[Math.floor(Math.random() * colors.length)];
    el.style.width = (Math.random() * 6 + 4) + 'px';
    el.style.height = (Math.random() * 6 + 4) + 'px';
    el.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    el.style.animationDuration = (Math.random() * 0.8 + 0.6) + 's';
    el.style.animationDelay = Math.random() * 0.3 + 's';
    document.body.appendChild(el);
    setTimeout(() => el.remove(), 2000);
  }
}

// ── 显示结果 ──
function showResult(idx) {
  const food = FOODS[idx];
  resultDisplay.className = 'show';
  resultDisplay.innerHTML =
    `<span class="emoji">${food.emoji}</span>` +
    `<span class="food-name">${food.name}</span>`;
  addHistory(food.name);
  fireConfetti();
}

// ── 历史记录 ──
function addHistory(name) {
  history.unshift(name);
  if (history.length > 30) history.pop();
  localStorage.setItem('foodHistory', JSON.stringify(history));
  renderHistory();
}

function renderHistory() {
  const el = document.getElementById('historyItems');
  if (history.length === 0) {
    el.innerHTML = '<span class="history-empty">还没有记录，转一下看看吧</span>';
    return;
  }
  el.innerHTML = history.map(n => `<span class="tag">${n}</span>`).join('');
}

document.getElementById('clearHistoryBtn').addEventListener('click', () => {
  history = [];
  localStorage.removeItem('foodHistory');
  renderHistory();
});

// ── 旋转动画 ──
function spin() {
  if (spinning) return;
  spinning = true;
  spinBtn.disabled = true;
  spinBtn.classList.add('spinning');
  spinBtn.textContent = '🌀 转动中...';
  resultDisplay.className = '';

  const extraTurns = 5 + Math.random() * 3;
  const extraAngle = Math.random() * TAU;
  const totalSpin = extraTurns * TAU + extraAngle;
  const startAngle = currentAngle;
  const targetAngle = startAngle + totalSpin;
  const duration = 3000 + Math.random() * 800;
  const startTime = performance.now();

  function easeOutCubic(t) { return 1 - Math.pow(1 - t, 3); }
  function easeOutBack(t) {
    const c = 1.70158;
    return 1 + c * Math.pow(t - 1, 3) + c * Math.pow(t - 1, 2);
  }

  function animate(time) {
    const elapsed = time - startTime;
    let progress = Math.min(elapsed / duration, 1);
    let eased;
    if (progress < 0.85) {
      eased = easeOutCubic(progress / 0.85) * 0.85;
    } else {
      const p = (progress - 0.85) / 0.15;
      eased = 0.85 + easeOutBack(p) * 0.15;
    }
    const angle = startAngle + (targetAngle - startAngle) * eased;
    currentAngle = angle;
    drawWheel(angle);

    if (progress < 1) {
      requestAnimationFrame(animate);
    } else {
      currentAngle = targetAngle % TAU;
      drawWheel(currentAngle);
      const idx = getSelectedFood(currentAngle);
      showResult(idx);
      spinning = false;
      spinBtn.disabled = false;
      spinBtn.classList.remove('spinning');
      spinBtn.textContent = '🎯 转一下！';
    }
  }
  requestAnimationFrame(animate);
}

spinBtn.addEventListener('click', spin);
canvas.addEventListener('click', spin);

document.addEventListener('keydown', e => {
  if (e.key === ' ' || e.key === 'Enter') { e.preventDefault(); spin(); }
});

drawWheel(0);
renderHistory();
</script>
</body>
</html>
